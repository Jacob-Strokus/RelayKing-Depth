[tox]
envlist = py{38,39,310,311,312}-{full,stubbed}, lint
skip_missing_interpreters = true

[testenv]
description = run auth tests
deps =
    pytest>=7.0
    full: impacket>=0.11.0
    full: ldap3>=2.9.1
    full: requests>=2.28.0
    full: requests-ntlm>=1.2.0
    full: dnspython>=2.3.0
    full: pyasn1>=0.4.8
commands =
    pytest tests/ -v {posargs}

[testenv:lint]
description = static analysis
deps =
    pyflakes
    pycodestyle
commands =
    pyflakes core/auth.py
    pycodestyle --max-line-length=120 --ignore=E501,W503 core/auth.py
